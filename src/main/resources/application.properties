spring.application.name=Urbelix
# Configuracion local para desarrollo con H2 persistente en disco


# Para usar MySQL en lugar de H2, descomenta estas líneas y configura tu servidor MySQL:
 spring.datasource.url=jdbc:mysql://localhost:3306/nexur_db
 spring.datasource.username=root
 spring.datasource.password=
 spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# URL del microservicio Python FastAPI
report.service.url=http://127.0.0.1:8000/analizar


