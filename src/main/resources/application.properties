spring.application.name=Nexur
# Configuracion local para desarrollo con H2 persistente en disco
spring.datasource.url=jdbc:h2:file:./data/nexurdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Para usar MySQL en lugar de H2, descomenta estas líneas y configura tu servidor MySQL:
# spring.datasource.url=jdbc:mysql://localhost:3306/nexur_db
# spring.datasource.username=root
# spring.datasource.password=TU_CONTRASEÑA
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

