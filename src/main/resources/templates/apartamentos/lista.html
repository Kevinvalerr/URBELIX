<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: page">
    <div th:fragment="content" th:with="titulo='Apartamentos'">
        <section class="page-top-section mb-4">
            <div>
                <h1>Apartamentos</h1>
                <p class="text-muted">Administra los apartamentos disponibles y asigna residentes fácilmente.</p>
            </div>
            <div class="page-actions">
                <a href="/apartamentos/nuevo" class="btn btn-primary btn-main-action">Nuevo Apartamento</a>
            </div>
        </section>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card activity-card">
            <h5>Listado de apartamentos</h5>
            <div class="table-dashboard mt-3">
                <table class="table align-middle mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Número</th>
                            <th>Torre</th>
                            <th>Piso</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="ap : ${apartamentos}">
                            <td th:text="${ap.id}">1</td>
                            <td th:text="${ap.numero}">101</td>
                            <td th:text="${ap.torre}">A</td>
                            <td th:text="${ap.piso}">1</td>
                            <td th:text="${ap.estado}">Disponible</td>
                            <td>
                                <a th:href="@{/apartamentos/editar/{id}(id=${ap.id})}" class="btn btn-sm btn-warning me-2">Editar</a>
                                <a th:href="@{/apartamentos/eliminar/{id}(id=${ap.id})}" class="btn btn-sm btn-outline-danger">Eliminar</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(apartamentos)}">
                            <td colspan="6" class="text-center text-muted">No hay apartamentos registrados todavía.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</html>
