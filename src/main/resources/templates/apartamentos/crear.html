<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: page">
    <div th:fragment="content" th:with="titulo='Crear Apartamento'">
        <section class="page-top-section mb-4">
            <div>
                <h1>Crear Apartamento</h1>
                <p class="text-muted">Agrega un nuevo apartamento para poder asignar residentes, pagos y reservas.</p>
            </div>
        </section>

        <div class="form-card">
            <form th:action="@{/apartamentos}" th:object="${apartamento}" method="post" class="form-grid">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="form-group">
                    <label>Número</label>
                    <input type="text" th:field="*{numero}" required />
                </div>
                <div class="form-group">
                    <label>Torre</label>
                    <input type="text" th:field="*{torre}" required />
                </div>
                <div class="form-group">
                    <label>Piso</label>
                    <input type="number" th:field="*{piso}" required />
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <input type="text" th:field="*{estado}" required />
                </div>
                <div class="form-actions">
                    <a th:href="@{/apartamentos}" class="btn btn-outline-primary">Volver</a>
                    <button type="submit" class="btn btn-primary btn-main-action">Guardar apartamento</button>
                </div>
            </form>
        </div>
    </div>
</html>
