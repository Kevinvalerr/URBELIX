<!DOCTYPE html>
<html xmlns:th="http:www.thymeleaft.org">
    <head>
        <title>Nuevo Apartamento</title>
    </head>
    <body>

     <h1>Registrar Apartamento</h1>

     <form th:action="@{/apartamentos}" th:object="${apartamento}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
       
       <label>Número</label>
       <input type="text" th:field="*{numero}" />
       <br><br>
      
       <label>Torre</label>
       <input type="text" th:field="*{torre}" />
       <br><br>
      
       <label>Piso</label>
       <input type="text" th:field="*{piso}" />
       <br><br>
      
       <label>Estado</label>
       <input type="text" th:field="*{estado}" />
       <br><br>

       <button type="submit">Guardar</button>

     </form>

    </body>
</html>
