<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: page">
    <div th:fragment="content" th:with="titulo='Registrar Visitante | NEXUR'">
        <section class="page-top-section">
            <div>
                <h1>Registrar Visitante</h1>
                <p class="text-muted">Registra la entrada de un visitante con los datos del apartamento y mantén el control ordenado.</p>
            </div>
        </section>

        <div class="card form-card">
            <div class="card-body">
                <form th:action="@{/visitantes/guardar}" th:object="${visitante}" method="post" class="form-grid">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="form-group">
                        <label class="form-label">Nombre</label>
                        <input type="text" th:field="*{nombre}" class="form-control" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Documento</label>
                        <input type="text" th:field="*{documento}" class="form-control" required pattern="[0-9]{8,}" title="Solo números, mínimo 8 dígitos" inputmode="numeric" />
                        <p class="form-error" th:if="${#fields.hasErrors('documento')}" th:errors="*{documento}"></p>
                    </div>
                    <div class="form-group form-full-width">
                        <label class="form-label">Apartamento</label>
                        <select th:field="*{apartamento.id}" class="form-select" required>
                            <option value="">Seleccione un apartamento</option>
                            <option th:each="apto : ${apartamentos}" th:value="${apto.id}" th:text="${apto.numero}"></option>
                        </select>
                        <p class="form-error" th:if="${#fields.hasErrors('apartamento')}" th:errors="*{apartamento}"></p>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary btn-main-action">Registrar entrada</button>
                        <a th:href="@{/visitantes}" class="btn btn-outline-primary">Volver a la lista</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</html>
