<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div class="card shadowp-4">
<body>

<div th:fragment="content">

   <h2 class="mb-4 fw-bold text-primary">Usuarios</h2>

  <a th:href="@{/usuarios/nuevo}" class="btn btn-primary mb-3">
     +Nuevo Usuario
  </a>

     

<table class="table table-hover table-bordered align-middle">


   

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="usuario : ${usuarios}">
            <td th:text="${usuario.id}"></td>
            <td th:text="${usuario.nombre}"></td>
            <td th:text="${usuario.email}"></td>
            <td>
                <a class="btn btn-warning btn-sm"
                th:href="@{/editar-usuario(id=${usuario.id})}">Editar</a>
                |
                <a class="btn btn-warning btn-sm" 
                th:href="@{/eliminar-usuario(id=${usuario.id})}">Eliminar</a>
            </td>
        </tr>
    </tbody>
</table>

<h3 class="mt-4"> Crear Usuario</h3>

<form action="/guardar-usuario" method="post" class="mt-3">

    <div class="mb-3">
    <label class="form-label">Nombre</label>
    <input type="text" name="nombre" class="form-control" required>
   </div>

    <div class="mb-3">
         <label class="form-label">Email</label>
    <input type="email" name="email" class="form-control" required>
     </div>

    <div class="mb-3">
       <label class="form-label">Password</label>
    <input type="password" name="password" class="form-control" required>
  </div>

    <div class="mb-3">
     <label class="form-label">Rol</label>
    <select name="rol" class="form-select">
        <option value="ADMIN">ADMIN</option>
        <option value="RESIDENTE">RESIDENTE</option>
        <option value="PORTERIA">PORTERIA</option>
    </select>
</div>

    <button class="btn btn-success">
        Guardar
    </button>

</form>
</div>
</div>
</html>
