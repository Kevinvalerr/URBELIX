<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:replace="layout/base :: page">
    <div th:fragment="content" th:with="titulo='Usuarios | NEXUR'">
        <!-- Page Header -->
        <div class="dashboard-welcome-header" style="margin-bottom: 2rem; padding: 2rem;">
            <div class="welcome-content" style="gap: 2rem;">
                <div class="welcome-avatar" style="background: linear-gradient(135deg, rgba(37, 99, 235, 0.2), rgba(239, 68, 68, 0.15));">
                    <i class="bi bi-person-gear"></i>
                </div>
                <div class="welcome-text">
                    <h1 class="welcome-title">Gestión de Usuarios</h1>
                    <p class="welcome-subtitle">Administra las cuentas y roles del sistema</p>
                </div>
            </div>
            <div class="welcome-stats">
                <div class="stat-item">
                    <div class="stat-number" th:text="${usuarios.size()}">0</div>
                    <div class="stat-label">Total</div>
                </div>
            </div>
        </div>

        <!-- Create User Button -->
        <div style="margin-bottom: 2rem;">
            <a th:href="@{/usuarios/nuevo}" class="btn btn-primary" style="background: linear-gradient(135deg, #2563EB, #06B6D4); border: none; padding: 0.75rem 2rem; border-radius: 12px; color: white; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; font-weight: 600; transition: all 0.3s ease;">
                <i class="bi bi-person-plus"></i>
                Nuevo Usuario
            </a>
        </div>
       <a href="/excel/residentes" class="btn btn-success">
    Exportar a Excel
</a>
        <!-- Users Table -->
        <div class="timeline-container" style="padding: 2rem;">
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; background: transparent;">
                    <thead>
                        <tr style="border-bottom: 2px solid rgba(37, 99, 235, 0.1);">
                            <th style="padding: 1rem; text-align: left; font-weight: 700; color: var(--text-primary); font-size: 0.95rem;">ID</th>
                            <th style="padding: 1rem; text-align: left; font-weight: 700; color: var(--text-primary); font-size: 0.95rem;">Nombre</th>
                            <th style="padding: 1rem; text-align: left; font-weight: 700; color: var(--text-primary); font-size: 0.95rem;">Email</th>
                            <th style="padding: 1rem; text-align: left; font-weight: 700; color: var(--text-primary); font-size: 0.95rem;">Rol</th>
                            <th style="padding: 1rem; text-align: center; font-weight: 700; color: var(--text-primary); font-size: 0.95rem;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="usuario : ${usuarios}" style="border-bottom: 1px solid rgba(37, 99, 235, 0.06); transition: background-color 0.3s ease;" onmouseover="this.style.backgroundColor='rgba(37, 99, 235, 0.02)'" onmouseout="this.style.backgroundColor='transparent'">
                            <td style="padding: 1rem; color: var(--text-primary); font-weight: 500;" th:text="${usuario.id}"></td>
                            <td style="padding: 1rem; color: var(--text-primary); font-weight: 500;" th:text="${usuario.nombre}"></td>
                            <td style="padding: 1rem; color: var(--text-secondary); font-weight: 500;" th:text="${usuario.email}"></td>
                            <td style="padding: 1rem;">
                                <span th:if="${usuario.rol != null and usuario.rol.name() == 'ADMIN'}" style="background: rgba(239, 68, 68, 0.1); color: #DC2626; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600;">Administrador</span>
                                <span th:if="${usuario.rol != null and usuario.rol.name() == 'RESIDENTE'}" style="background: rgba(14, 165, 233, 0.1); color: #0EA5E9; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600;">Residente</span>
                                <span th:if="${usuario.rol != null and usuario.rol.name() == 'PORTERIA'}" style="background: rgba(34, 197, 94, 0.1); color: #16A34A; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600;">Portería</span>
                            </td>
                            <td style="padding: 1rem; text-align: center;">
                                <div style="display: flex; gap: 0.5rem; justify-content: center;">
                                    <a class="btn btn-warning btn-sm" th:href="@{/usuarios/editar/{id}(id=${usuario.id})}" style="background: rgba(251, 191, 36, 0.1); color: #D97706; padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: all 0.3s ease;" onmouseover="this.style.background='rgba(251, 191, 36, 0.2)'" onmouseout="this.style.background='rgba(251, 191, 36, 0.1)'">
                                        <i class="bi bi-pencil"></i> Editar
                                    </a>
                                    <a class="btn btn-danger btn-sm" th:href="@{/usuarios/eliminar/{id}(id=${usuario.id})}" style="background: rgba(239, 68, 68, 0.1); color: #DC2626; padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: all 0.3s ease;" onmouseover="this.style.background='rgba(239, 68, 68, 0.2)'" onmouseout="this.style.background='rgba(239, 68, 68, 0.1)'" onclick="return confirm('¿Estás seguro de que quieres eliminar este usuario?')">
                                        <i class="bi bi-trash"></i> Eliminar
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(usuarios)}" style="border-bottom: none;">
                            <td colspan="5" style="padding: 3rem; text-align: center; color: var(--text-muted); font-style: italic;">
                                <i class="bi bi-person-gear" style="font-size: 3rem; color: var(--text-muted); margin-bottom: 1rem;"></i>
                                <br>
                                No hay usuarios registrados
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</html>
