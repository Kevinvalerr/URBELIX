<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: page">
    <div th:fragment="content" th:with="titulo='Usuarios | NEXUR'">
        <section class="page-top-section">
            <div>
                <h1>Usuarios</h1>
                <p class="text-muted">Gestiona las cuentas y roles del sistema desde un solo espacio.</p>
            </div>
            <div class="page-actions">
                <a th:href="@{/usuarios/nuevo}" class="btn btn-primary btn-main-action">Nuevo usuario</a>
            </div>
        </section>

        <div class="card table-card mb-4">
            <div class="card-body">
                <div class="table-dashboard">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Email</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="usuario : ${usuarios}">
                                <td th:text="${usuario.id}"></td>
                                <td th:text="${usuario.nombre}"></td>
                                <td th:text="${usuario.email}"></td>
                                <td>
                                    <a class="btn btn-warning btn-sm" th:href="@{/editar-usuario(id=${usuario.id})}">Editar</a>
                                    <a class="btn btn-danger btn-sm" th:href="@{/eliminar-usuario(id=${usuario.id})}">Eliminar</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(usuarios)}">
                                <td colspan="4" class="text-center text-muted">No hay usuarios registrados todavía.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</html>
