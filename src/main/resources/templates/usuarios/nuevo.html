<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: page">
    <div th:fragment="content" th:with="titulo='Crear usuario | NEXUR'">
        <section class="page-top-section">
            <div>
                <h1>Crear usuario</h1>
                <p class="text-muted">Registra una nueva cuenta con un rol y credenciales seguras.</p>
            </div>
            <div class="page-actions">
                <a th:href="@{/usuarios}" class="btn btn-outline-primary">Volver a usuarios</a>
            </div>
        </section>

        <div class="card form-card">
            <div class="card-body">
                      <form th:action="@{/usuarios/guardar}" method="post" class="mt-3 form-grid">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

    <!-- USUARIO -->
    <div class="form-group">
        <label>Nombre</label>
        <input type="text" name="nombre" class="form-control" required>
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" class="form-control" required>
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" required>
    </div>

    <div class="form-group">
        <label>Rol</label>
        <select name="rol" class="form-select">
            <option value="ADMIN">ADMIN</option>
            <option value="RESIDENTE" selected>RESIDENTE</option>
            <option value="PORTERIA">PORTERIA</option>
        </select>
    </div>


    <div class="form-group">
        <label>Documento</label>
        <input type="text" name="documento" class="form-control" required>
    </div>

    <div class="form-group">
        <label>Teléfono</label>
        <input type="text" name="telefono" class="form-control" required>
    </div>

    <div class="form-group">
        <label>Apartamento</label>
        <input type="text" name="numeroApartamento" class="form-control" required>
    </div>

    <

    <div class="form-actions">
        <button class="btn btn-success">Crear usuario</button>
    </div>
</form>
            </div>
        </div>
    </div>
</html>
