<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: page">
    <div th:fragment="content" th:with="titulo='Crear usuario | Urbelix'">
        <section class="page-top-section">
            <div>
                <h1>Crear usuario</h1>
                <p class="text-muted">Registra una nueva cuenta con credenciales seguras.</p>
            </div>
            <div class="page-actions">
                <a th:href="@{/usuarios}" class="btn btn-outline-primary">Volver a usuarios</a>
            </div>
        </section>

        <div class="card form-card">
            <div class="card-body">
                <form th:action="@{/usuarios/guardar}" th:object="${usuarioForm}" method="post" class="mt-3 form-grid">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                        <ul>
                            <li th:each="err : ${#fields.globalErrors()}" th:text="${err}"></li>
                        </ul>
                    </div>

                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" th:field="*{nombre}" class="form-control" required />
                        <p class="error-message" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></p>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" th:field="*{email}" class="form-control" required autocomplete="email" title="Correo válido: usuario@dominio.com" />
                        <p class="error-message" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" th:field="*{password}" class="form-control" required minlength="8" autocomplete="new-password"
                               title="Mínimo 8 caracteres, al menos una mayúscula, una minúscula, un número y un símbolo" />
                        <small class="text-muted">La contraseña debe tener al menos 8 caracteres, mayúscula, minúscula, número y símbolo.</small>
                        <p class="error-message" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                    </div>

                    <div class="form-group">
                        <label>Confirmar contraseña</label>
                        <input type="password" th:field="*{confirmPassword}" class="form-control" required minlength="8" autocomplete="new-password" title="Repita la contraseña anterior" />
                        <p class="error-message" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
                    </div>

                    <div class="form-group">
                        <label>Documento</label>
                        <input type="text" th:field="*{documento}" class="form-control" required inputmode="numeric"
                               pattern="^[0-9]{6,12}$"
                               title="Solo números, entre 6 y 12 dígitos" />
                        <p class="error-message" th:if="${#fields.hasErrors('documento')}" th:errors="*{documento}"></p>
                    </div>

                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="tel" th:field="*{telefono}" class="form-control" required inputmode="tel"
                               pattern="^\+?[0-9]{7,15}$"
                               title="Solo números, 7 a 15 dígitos, opcional prefijo +" />
                        <p class="error-message" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></p>
                    </div>

                    <div class="form-group">
                        <label>Apartamento</label>
                        <input type="text" th:field="*{numeroApartamento}" class="form-control" required />
                        <p class="error-message" th:if="${#fields.hasErrors('numeroApartamento')}" th:errors="*{numeroApartamento}"></p>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-success">Crear usuario</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</html>
