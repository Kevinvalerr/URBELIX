<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: page">
    <div th:fragment="content" th:with="titulo='Editar usuario | Urbelix'">
        <section class="page-top-section">
            <div>
                <h1>Editar usuario</h1>
                <p class="text-muted">Actualiza los datos del usuario y guarda los cambios para mantener el sistema seguro.</p>
            </div>
            <div class="page-actions">
                <a th:href="@{/usuarios}" class="btn btn-outline-primary">Volver a usuarios</a>
            </div>
        </section>

        <div class="card form-card">
            <div class="card-body">
                <form th:action="@{/usuarios/actualizar/{id}(id=${usuario.id})}" th:object="${usuario}" method="post" class="mt-3 form-grid js-validated-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" th:field="*{id}" />

                    <div class="form-group">
                        <label class="form-label">Nombre</label>
                        <input type="text" th:field="*{nombre}" class="form-control" required />
                        <p class="error-message"></p>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" required />
                        <p class="error-message"></p>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Rol</label>
                        <select th:field="*{rol}" class="form-select" required>
                            <option value="ADMIN">ADMIN</option>
                            <option value="RESIDENTE">RESIDENTE</option>
                            <option value="PORTERIA">PORTERIA</option>
                        </select>
                        <p class="error-message"></p>
                    </div>
                    <div class="form-group form-full-width">
                        <label class="form-label">Password</label>
                        <input type="password" th:field="*{password}" class="form-control" placeholder="Dejar en blanco para mantener la contraseña actual" />
                        <small class="text-muted">Escribe una nueva contraseña solo si deseas cambiarla.</small>
                        <p class="error-message"></p>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary btn-main-action">Guardar cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</html>
