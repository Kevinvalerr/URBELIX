<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: page">
    <div th:fragment="content" th:with="titulo='Editar usuario | NEXUR'">
        <section class="page-top-section">
            <div>
                <h1>Editar usuario</h1>
                <p class="text-muted">Actualiza los datos del usuario y guarda los cambios para mantener el sistema seguro.</p>
            </div>
            <div class="page-actions">
                <a th:href="@{/usuarios-vista}" class="btn btn-outline-primary">Volver a usuarios</a>
            </div>
        </section>

        <div class="card form-card">
            <div class="card-body">
                <form th:action="@{/actualizar-usuario}" method="post" class="mt-3 form-grid">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="id" th:value="${usuario.id}" />

                    <div class="form-group">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="nombre" th:value="${usuario.nombre}" class="form-control" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" th:value="${usuario.email}" class="form-control" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Rol</label>
                        <select name="rol" class="form-select" required>
                            <option value="ADMIN" th:selected="${usuario.rol.name() == 'ADMIN'}">ADMIN</option>
                            <option value="RESIDENTE" th:selected="${usuario.rol.name() == 'RESIDENTE'}">RESIDENTE</option>
                            <option value="PORTERIA" th:selected="${usuario.rol.name() == 'PORTERIA'}">PORTERIA</option>
                        </select>
                    </div>
                    <div class="form-group form-full-width">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Dejar en blanco para mantener la contraseña actual" />
                        <small class="text-muted">Escribe una nueva contraseña solo si deseas cambiarla.</small>
                    </div>

                    <div class="form-actions">
                        <button class="btn btn-primary btn-main-action">Guardar cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</html>
