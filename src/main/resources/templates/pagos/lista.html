<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: page">
    <div th:fragment="content" th:with="titulo='Pagos'">
        <section class="page-top-section mb-4">
            <div>
                <h1>Pagos</h1>
                <p class="text-muted">Revisa los pagos registrados y agrega nuevos movimientos rápidamente.</p>
            </div>
            <div class="page-actions">
                <a href="/pagos/nuevo" class="btn btn-primary btn-main-action">
                    <i class="bi bi-cash-stack me-2"></i>Registrar pago
                </a>
            </div>
        </section>

        <div class="card activity-card">
            <h5>Listado de pagos</h5>

            
                        <form th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
                          th:action="@{/pagos/generar}" method="post" style="margin-bottom: 15px;">
                           <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                          <button type="submit" class="btn btn-warning">
                             Generar administración
                          </button>
                      </form>

            <div class="table-dashboard mt-3">
                <table class="table align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Residente</th>
                            <th>Apartamento</th>
                            <th>Monto</th>
                            <th>Método</th>
                            <th>Fecha</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="pago : ${pagos}">
                            <td th:text="${pago.residente != null ? pago.residente.nombre : '—'}">Residente</td>
                            <td th:text="${pago.apartamento != null ? pago.apartamento.numero : '—'}">Apartamento</td>
                            <td th:text="${pago.monto}">$0</td>
                            <td th:text="${pago.metodo}">Método</td>
                            <td th:text="${pago.fecha}">Fecha</td>
                            <td th:text="${pago.estadoPago}">Estado</td> 
                            <td>
                             <a th:if="${pago.estadoPago.name() == 'PENDIENTE'}"
                               th:href="@{/pagos/pagar/{id}(id=${pago.id})}"
                               class="btn btn-success btn-sm">
                                 Pagar
                             </a>
                            </td>   
                        </tr>
                        <tr th:if="${#lists.isEmpty(pagos)}">
                            <td colspan="7" class="text-center text-muted">No hay pagos registrados todavía.</td>
                        </tr>

                    </tbody>
                </table>
            </div>
        </div>
    </div>
</html>
