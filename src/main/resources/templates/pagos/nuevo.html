<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: page">
    <div th:fragment="content" th:with="titulo='Registrar Pago'">
        <section class="page-top-section mb-4">
            <div>
                <h1>Registrar Pago</h1>
                <p class="text-muted">Registra aquí los pagos de los residentes y mantén el historial financiero al día.</p>
            </div>
        </section>

        <div class="form-card">
            <form th:action="@{/pagos/guardar}" th:object="${pago}" method="post" class="form-grid">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="form-group">
                    <label for="residente">Residente</label>
                    <input id="residente" th:field="*{residente}" type="text" placeholder="Nombre del residente" required />
                    <p class="form-error" th:if="${#fields.hasErrors('residente')}" th:errors="*{residente}"></p>
                </div>
                <div class="form-group">
                    <label for="apartamentoId">Apartamento</label>
                    <select id="apartamentoId" th:field="*{apartamento.id}" class="form-select" required>
                        <option value="">Seleccione un apartamento</option>
                        <option th:each="apto : ${apartamentos}" th:value="${apto.id}" th:text="${apto.numero} + ' - Torre ' + ${apto.torre} + ' - Piso ' + ${apto.piso}"></option>
                    </select>
                    <p class="form-error" th:if="${#fields.hasErrors('apartamento')}" th:errors="*{apartamento}"></p>
                </div>
                <div class="form-group">
                    <label for="monto">Monto</label>
                    <input id="monto" th:field="*{monto}" type="text" placeholder="Ej. 350000" required />
                    <p class="form-error" th:if="${#fields.hasErrors('monto')}" th:errors="*{monto}"></p>
                </div>
                <div class="form-group">
                    <label for="metodo">Método de pago</label>
                    <select id="metodo" th:field="*{metodo}" required>
                        <option value="">Seleccione método</option>
                        <option value="Efectivo">Efectivo</option>
                        <option value="Tarjeta">Tarjeta</option>
                        <option value="Transferencia">Transferencia</option>
                    </select>
                    <p class="form-error" th:if="${#fields.hasErrors('metodo')}" th:errors="*{metodo}"></p>
                </div>
                <div class="form-group">
                    <label for="fecha">Fecha</label>
                    <input id="fecha" th:field="*{fecha}" type="date" required />
                    <p class="form-error" th:if="${#fields.hasErrors('fecha')}" th:errors="*{fecha}"></p>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-main-action">
                        <i class="bi bi-cash-stack me-2"></i>Guardar pago
                    </button>
                </div>
            </form>
        </div>
    </div>
</html>
