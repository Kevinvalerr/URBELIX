<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: page">
    <div th:fragment="content" th:with="titulo='Registrar Pago'">
        <section class="page-top-section mb-4">
            <div>
                <h1>Registrar Pago</h1>
                <p class="text-muted">Registra aquí los pagos de los residentes y mantén el historial financiero al día.</p>
            </div>
        </section>

        <div class="form-card">
            <form th:action="@{/pagos/guardar}" th:object="${pago}" method="post" class="form-grid">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="form-group">
                    <label for="residente">Residente</label>
                    <input type="hidden" name="residenteId" th:value="${pago.residente.id}" />
                    <input type="text" th:value="${pago.residente.nombre}" class="form-control" readonly />
                    <p class="form-error" th:if="${#fields.hasErrors('residente')}" th:errors="*{residente}"></p>
                </div>
                <div class="form-group">
                    <label for="apartamentoId">Apartamento</label>
                    <input type="text" th:value="${pago.apartamento.numero}" class="form-control" readonly />
                    <p class="form-error" th:if="${#fields.hasErrors('apartamento')}" th:errors="*{apartamento}"></p>
                </div>
                <div class="form-group">
                    <label for="monto">Monto</label>
                    <input id="monto" th:field="*{monto}" type="number" step="0.01" placeholder="Ej. 350000" required />
                    <p class="form-error" th:if="${#fields.hasErrors('monto')}" th:errors="*{monto}"></p>
                </div>
                <div class="form-group">
                    <label for="metodo">Método de pago</label>
                    <select id="metodo" th:field="*{metodo}" class="form-select" required>
                        <option value="">Seleccione método</option>
                        <option value="PSE">PSE</option>
                        <option value="TARJETA">Tarjeta</option>
                        <option value="EFECTIVO">Efectivo</option>
                        <option value="TRANSFERENCIA">Transferencia</option>
                    </select>
                    <p class="form-error" th:if="${#fields.hasErrors('metodo')}" th:errors="*{metodo}"></p>
                </div>
                <div class="form-group">
                    <label for="tipoPago">Tipo de pago</label>
                    <select id="tipoPago" th:field="*{tipoPago}" class="form-select" required>
                        <option value="">Seleccione tipo</option>
                        <option value="ADMINISTRACION">Administración</option>
                        <option value="MULTA">Multa</option>
                        <option value="OTRO">Otro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="fechaVencimiento">Fecha de vencimiento</label>
                    <input id="fechaVencimiento" th:field="*{fechaVencimiento}" type="date" class="form-control" />
                </div>
                <div class="form-group">
                    <label for="fecha">Fecha</label>
                    <input id="fecha" th:field="*{fecha}" class="form-control" type="date" required />
                    <p class="form-error" th:if="${#fields.hasErrors('fecha')}" th:errors="*{fecha}"></p>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-main-action btn-sm">
                        <i class="bi bi-cash-stack me-2"></i>Guardar pago
                    </button>
                </div>
            </form>
        </div>
    </div>
</html>
