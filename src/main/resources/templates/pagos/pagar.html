<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: page">
<div th:fragment="content" th:with="titulo='Pagar Pago'">

    <section class="page-top-section mb-4">
        <div>
            <h1>Pagar Pago</h1>
            <p class="text-muted">Simula el proceso de pago para este movimiento pendiente.</p>
        </div>
    </section>

    <div>
        <h2>Simulación de Pago</h2>

        <p>Monto: <span th:text="${pago.monto}"></span></p>
        <p>Tipo: <span th:text="${pago.tipoPago}"></span></p>

        <div class="mb-3">
            <form th:action="@{/pagos/{id}/confirmar(id=${pago.id})}" method="post" th:if="${pago.metodo.name() != 'PSE'}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-success">Confirmar Pago (manual)</button>
            </form>

            <a th:if="${pago.metodo.name() == 'PSE'}"
               th:href="@{'/pagos/' + ${pago.id} + '/simular-pse'}"
               class="btn btn-primary">Pagar con PSE (Simular)</a>
        </div>

        <a th:href="@{'/pagos/' + ${pago.id}}" class="btn btn-secondary">Volver</a>
    </div>

</div>
</html>
