<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: page">
    <div th:fragment="content" th:with="titulo='Reservas'">
        <section class="page-top-section mb-4">
            <div>
                <h1>Reservas</h1>
                <p class="text-muted">Consulta las reservas activas y gestiona nuevas solicitudes de áreas comunes.</p>
            </div>
            <div class="page-actions">
                <a href="/reservas/nueva" class="btn btn-primary btn-main-action">
                    <i class="bi bi-calendar-check-fill me-2"></i>Crear reserva
                </a>
            </div>
        </section>

        <div class="card activity-card">
            <h5>Listado de reservas</h5>
            <div class="table-dashboard mt-3">
                <table class="table align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Solicitante</th>
                            <th>Apartamento</th>
                            <th>Área</th>
                            <th>Fecha</th>
                            <th>Observaciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="reserva : ${reservas}">
                            <td th:text="${reserva.solicitante}">Solicitante</td>
                            <td th:text="${reserva.apartamento != null ? reserva.apartamento.numero : '—'}">Apartamento</td>
                            <td th:text="${reserva.area}">Área</td>
                            <td th:text="${reserva.fecha}">Fecha</td>
                            <td th:text="${reserva.observaciones}">Observaciones</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(reservas)}">
                            <td colspan="5" class="text-center text-muted">No hay reservas registradas todavía.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</html>
