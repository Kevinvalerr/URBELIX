<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: page">
    
<div th:if="${success}" class="alert alert-success">
    <span th:text="${success}"></span>
    </div>

    <div th:fragment="content" th:with="titulo='Reservas'">
        <section class="page-top-section mb-4">
            <div>
                <h1>Reservas</h1>
                <p class="text-muted">Consulta las reservas activas y gestiona nuevas solicitudes de áreas comunes.</p>
            </div>
            <div class="page-actions">
                <a href="/reservas/nueva" sec:authorize="hasRole('RESIDENTE')" class="btn btn-primary btn-main-action btn-sm">
                    <i class="bi bi-calendar-check-fill me-2"></i>Crear reserva
                </a>
            </div>
        </section>

        <div class="card activity-card">
            <h5>Listado de reservas</h5>
            <div class="table-dashboard mt-3">
                <table class="table table-hover table-striped align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Solicitante</th>
                            <th>Apartamento</th>
                            <th>Área</th>
                            <th>Fecha</th>
                            <th>Observaciones</th>
                           <th th:if="${#authorization.expression('hasRole(''ADMIN'')')}">Acciones</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody><tr th:each="reserva : ${reservas}">
    <td th:text="${reserva.residente != null ? reserva.residente.nombre : 'N/A'}"></td>
    <td th:text="${reserva.apartamento != null ? reserva.apartamento.numero : '—'}"></td>
    <td th:text="${reserva.tipoEspacio}"></td>
    <td th:text="${#temporals.format(reserva.fechaInicio, 'yyyy-MM-dd HH:mm')}"></td>
    <td>
        <small class="text-muted d-block" style="white-space: pre-wrap; max-width: 300px;" th:text="${reserva.observaciones}"></small>
    </td>
<td th:if="${#authorization.expression('hasRole(''ADMIN'')')}" style="width: 220px; min-width: 220px; max-width: 220px; vertical-align: top;">
    <div th:if="${reserva.estado.name() == 'PENDIENTE'}" class="d-flex flex-column gap-2" style="width: 100%;">
        <form method="post" class="d-grid gap-2">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <textarea name="comentario" class="form-control form-control-sm" placeholder="Escribe el mensaje al residente..." rows="3" style="resize: vertical; width: 100%;"></textarea>
            <div class="d-flex gap-2">
                <button type="submit" th:attr="formaction=@{/reservas/aprobar/{id}(id=${reserva.id})}" class="btn btn-sm btn-success flex-grow-1">
                    <i class="bi bi-check-circle me-1"></i> Aprobar
                </button>
                <button type="submit" th:attr="formaction=@{/reservas/rechazar/{id}(id=${reserva.id})}" class="btn btn-sm btn-danger flex-grow-1">
                    <i class="bi bi-x-circle me-1"></i> Rechazar
                </button>
            </div>
        </form>
    </div>
    <div th:if="${reserva.estado.name() != 'PENDIENTE'}" class="text-center">
        <p class="text-muted fst-italic mb-0">Ya procesada</p>
    </div>
</td>
    <td>
        <span
            th:classappend="${reserva.estado.name() == 'PENDIENTE'} ? 'badge bg-warning text-dark' : (${reserva.estado.name() == 'APROBADA'} ? 'badge bg-success' : (${reserva.estado.name() == 'RECHAZADA'} ? 'badge bg-danger' : 'badge bg-secondary'))"
            th:text="${reserva.estado}">
        </span>
    </td>
</tr>
                        <tr th:if="${#lists.isEmpty(reservas)}">
                            <td colspan="7" class="text-center text-muted">No hay reservas registradas todavía.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</html>
