<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: page">
    
<div th:if="${success}" class="alert alert-success">
    <span th:text="${success}"></span>
    </div>

    <div th:fragment="content" th:with="titulo='Reservas'">
        <section class="page-top-section mb-4">
            <div>
                <h1>Reservas</h1>
                <p class="text-muted">Consulta las reservas activas y gestiona nuevas solicitudes de áreas comunes.</p>
            </div>
            <div class="page-actions">
                <a href="/reservas/nueva" class="btn btn-primary btn-main-action">
                    <i class="bi bi-calendar-check-fill me-2"></i>Crear reserva
                </a>
            </div>
        </section>

        <div class="card activity-card">
            <h5>Listado de reservas</h5>
            <div class="table-dashboard mt-3">
                <table class="table align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Solicitante</th>
                            <th>Apartamento</th>
                            <th>Área</th>
                            <th>Fecha</th>
                            <th>Observaciones</th>
                           <th th:if="${#authorization.expression('hasAuthority(''ADMIN'')')}">Acciones</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody><tr th:each="reserva : ${reservas}">
    <td th:text="${reserva.residente != null ? reserva.residente.nombre : 'N/A'}"></td>
    <td th:text="${reserva.apartamento != null ? reserva.apartamento.numero : '—'}"></td>
    <td th:text="${reserva.tipoEspacio}"></td>
    <td th:text="${#temporals.format(reserva.fechaInicio, 'yyyy-MM-dd HH:mm')}"></td>
    <td th:text="${reserva.observaciones}"></td>
    <td th:text="${reserva.estado}"></td>
<td th:if="${#authorization.expression('hasAuthority(''ADMIN'')')}">
    <form th:action="@{/reservas/aprobar/{id}(id=${reserva.id})}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit">Aprobar</button>
    </form>

    <form th:action="@{/reservas/rechazar/{id}(id=${reserva.id})}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit">Rechazar</button>
    </form>
</td>
</tr>
                        <tr th:if="${#lists.isEmpty(reservas)}">
                            <td colspan="6" class="text-center text-muted">No hay reservas registradas todavía.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</html>
