<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">


<!-- <link rel="stylesheet" th:href="@{/css/styles.css}"> -->
<head>
    <meta charset="UTF-8">
    <title>Nexur</title>

    <!-- 🎨 Bootstrap (framework de diseño) -->
  <link th:src="@{/js/bootstrap.bundle.min.js}">
    <!-- 🎨 Estilos personalizados -->
  <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">

  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body th:fragment="body" style="background-color: #f4f6f9;">

<!-- 🔝 NAVBAR GLOBAL -->
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #1f3a5f;">
    <div class="container-fluid">


        <!-- 🏷️ LOGO / NOMBRE -->
        <a class="navbar-brand" th:href="@{/dashboard}">Nexur</a>

        <!-- 📂 MENÚ -->
        <div class="collapse navbar-collapse">

            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/usuarios}">Usuarios</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/apartamentos}">Apartamentos</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/residentes}">Residentes</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/visitantes}">Visitantes</a>
                </li>

            </ul>

            <!-- 🔐 LOGOUT (Spring Security) -->
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline-light">
                    Cerrar sesión
                </button>
            </form>

        </div>
    </div>
</nav>

<!-- 📦 CONTENIDO DINÁMICO -->
<div class="container mt-4">

    <!-- 🔙 BOTÓN VOLVER GLOBAL -->
    <a href="javascript:history.back()" class="btn btn-secondary mb-3">
        ← Volver
    </a>

    <!-- 🔄 AQUÍ SE INYECTA CADA VISTA -->
   <div th:replace="~{usuarios/lista :: content}"></div>

</div>

<!-- 🔻 FOOTER -->
<footer class="text-center mt-5 p-3 bg-dark text-white">
   NEXUR - 
</footer>

<!-- ⚡ JS Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
