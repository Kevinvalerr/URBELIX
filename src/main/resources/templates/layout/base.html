<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="page">



<!-- <link rel="stylesheet" th:href="@{/css/styles.css}"> -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} ?: 'NEXUR'">NEXUR</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</head>

<body class="layout-body">

<nav class="navbar navbar-dark px-4 navbar-main">
    <span class="navbar-brand fw-bold">NEXUR</span>
    <div class="d-flex align-items-center gap-3">
        <span class="text-light small" sec:authorize="hasRole('ADMIN')">Admin</span>
        <span class="text-light small" sec:authorize="hasRole('RESIDENTE')">Residente</span>
        <span class="text-light small" sec:authorize="hasRole('PORTERIA')">Portería</span>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button class="btn btn-sm btn-outline-light">Cerrar sesión</button>
        </form>
    </div>
</nav>

<div class="d-flex layout-shell">
    <div th:replace="layout/sidebar :: sidebar"></div>
    <main class="flex-grow-1 p-4 layout-main">
        <div th:if="${currentPath != '/dashboard'}">
            <a th:if="${volverUrl != null}" th:href="${volverUrl}" class="btn btn-secondary mb-3">← Volver</a>
        </div>
        <div th:insert="~{::content}"></div>
    </main>
</div>

<footer class="text-center mt-5 p-3 footer-bar">NEXUR - Panel de gestión residencial</footer>

</body>
</html>
