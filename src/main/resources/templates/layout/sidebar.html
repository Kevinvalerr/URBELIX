<div xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="sidebar" class="sidebar-panel">
    <div class="sidebar-brand mb-4">
        <div class="sidebar-brand-icon">
            <i class="bi bi-building"></i>
        </div>
        <div class="sidebar-brand-text">
            <span class="sidebar-brand-name">Urbelix</span>
            <span class="sidebar-brand-subtitle">
                <span sec:authorize="hasRole('ADMIN')">Panel administrativo</span>
                <span sec:authorize="hasRole('RESIDENTE')">Panel de residente</span>
                <span sec:authorize="hasRole('PORTERIA')">Panel de portería</span>
                <span sec:authorize="isAnonymous()">Panel</span>
            </span>
        </div>
    </div>

    <div class="sidebar-user mb-4" sec:authorize="isAuthenticated()">
        <p class="mb-1 text-muted small">Bienvenido</p>
        <strong class="sidebar-user-name" th:text="${currentUser}">Usuario</strong>
        <p class="sidebar-user-role">
            Rol:
            <span class="role-pill" th:text="${currentRoleName}">Rol</span>
        </p>
    </div>

    <nav class="nav flex-column gap-2">
        <a href="/dashboard" class="nav-link sidebar-link d-flex align-items-center" th:classappend="${currentPath != null and currentPath.startsWith('/dashboard')} ? ' active' : ''">
            <i class="bi bi-speedometer2 me-2"></i>
            Dashboard
        </a>

        <div sec:authorize="hasRole('ADMIN')">
            <a href="/residentes" class="nav-link sidebar-link d-flex align-items-center" th:classappend="${currentPath != null and currentPath.startsWith('/residentes')} ? ' active' : ''">
                <i class="bi bi-people-fill me-2"></i>
                Residentes
            </a>
            <a href="/apartamentos" class="nav-link sidebar-link d-flex align-items-center" th:classappend="${currentPath != null and currentPath.startsWith('/apartamentos')} ? ' active' : ''">
                <i class="bi bi-building me-2"></i>
                Apartamentos
            </a>
            <a href="/usuarios-vista" class="nav-link sidebar-link d-flex align-items-center" th:classappend="${currentPath != null and currentPath.startsWith('/usuarios')} ? ' active' : ''">
                <i class="bi bi-person-badge me-2"></i>
                Usuarios
            </a>
            <a href="/reportes" class="nav-link sidebar-link d-flex align-items-center" th:classappend="${currentPath != null and currentPath.startsWith('/reportes')} ? ' active' : ''">
                <i class="bi bi-bar-chart-line me-2"></i>
                Reportes
            </a>
        </div>

        <a href="/visitantes" class="nav-link sidebar-link d-flex align-items-center" th:classappend="${currentPath != null and currentPath.startsWith('/visitantes')} ? ' active' : ''" sec:authorize="hasAnyRole('ADMIN','PORTERIA','RESIDENTE')">
            <i class="bi bi-door-open-fill me-2"></i>
            Visitantes
        </a>
        <a href="/reservas/nueva" class="nav-link sidebar-link d-flex align-items-center" th:classappend="${currentPath != null and currentPath.startsWith('/reservas')} ? ' active' : ''" sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-calendar-check me-2"></i>
            Aprobacion de reservas
        </a>
        <a href="/reservas/nueva" class="nav-link sidebar-link d-flex align-items-center" th:classappend="${currentPath != null and currentPath.startsWith('/reservas')} ? ' active' : ''" sec:authorize="!hasRole('ADMIN')">
            <i class="bi bi-calendar-check me-2"></i>
            Crear reserva
        </a>

        </a>
        <a href="/pagos" class="nav-link sidebar-link d-flex align-items-center" th:classappend="${currentPath == '/pagos'} ? ' active' : ''" sec:authorize="isAuthenticated()">
            <i class="bi bi-cash-stack me-2"></i>
            Ver pagos
        </a>



    </nav>
</div>
