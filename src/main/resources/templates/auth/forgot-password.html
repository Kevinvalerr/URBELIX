<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña | NEXUR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <main class="auth-page">
        <section class="auth-card" aria-labelledby="forgot-heading">
            <div class="brand-mark" aria-hidden="true">N</div>
            <div class="mb-4">
                <h1 id="forgot-heading" class="auth-heading">Recuperar contraseña</h1>
                <p class="auth-subtitle">Ingresa tu correo y recibe instrucciones para restablecer tu contraseña.</p>
            </div>

            <form th:action="@{/forgot-password}" th:method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

                <div class="form-group">
                    <label for="email" class="form-label">Correo electrónico</label>
                    <input id="email" name="email" type="email" class="form-control" placeholder="correo@ejemplo.com" required autocomplete="email">
                </div>

                <button type="submit" class="primary-button">Enviar enlace</button>
            </form>

            <div class="link-group">
                ¿Recordaste tu contraseña? <a th:href="@{/login}">Volver al login</a>
            </div>
        </section>
    </main>
</body>
</html>
