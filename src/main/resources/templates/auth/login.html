<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | NEXUR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <main class="auth-page">
        <section class="auth-card" aria-labelledby="login-heading">
            <div class="brand-mark" aria-hidden="true">N</div>
            <div class="mb-4">
                <h1 id="login-heading" class="auth-heading">Iniciar sesión</h1>
                <p class="auth-subtitle">Accede a tu cuenta para continuar</p>
            </div>

            <form th:action="@{/login}" th:method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div th:if="${loginError}" class="alert alert-danger" th:text="${loginError}"></div>
                <div th:if="${logoutMessage}" class="alert alert-success" th:text="${logoutMessage}"></div>
                <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

                <div class="form-group">
                    <label for="username" class="form-label">Correo electrónico</label>
                    <input id="username" name="username" type="text" class="form-control" placeholder="correo@ejemplo.com" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Contraseña</label>
                    <input id="password" name="password" type="password" class="form-control" placeholder="**********" required autocomplete="current-password">
                </div>

                <button type="submit" class="primary-button">Ingresar</button>

                <a class="forgot-link" th:href="@{/forgot-password}">¿Olvidaste tu contraseña?</a>
            </form>

           
        </section>
    </main>
</body>
</html>
