<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | NEXUR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <main class="auth-page">
        <section class="auth-card" aria-labelledby="register-heading">
            <div class="brand-mark" aria-hidden="true">N</div>
            <div class="mb-4">
                <h1 id="register-heading" class="auth-heading">Crear cuenta</h1>
                <p class="auth-subtitle">Registra tus datos para acceder al panel de NEXUR.</p>
            </div>

            <form th:action="@{/register}" th:object="${usuario}" th:method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div th:if="${formError}" class="alert alert-danger" th:text="${formError}"></div>

                <div class="form-group">
                    <label for="fullname" class="form-label">Nombre completo</label>
                    <input id="fullname" th:field="*{nombre}" type="text" class="form-control" placeholder="Tu nombre completo" required autocomplete="name">
                    <p class="form-error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></p>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Correo electrónico</label>
                    <input id="email" th:field="*{email}" type="email" class="form-control" placeholder="correo@ejemplo.com" required autocomplete="email">
                    <p class="form-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Contraseña</label>
                    <input id="password" th:field="*{password}" type="password" class="form-control" placeholder="Crea una contraseña segura" required autocomplete="new-password">
                    <p class="form-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirmar contraseña</label>
                    <input id="confirmPassword" name="confirmPassword" type="password" class="form-control" placeholder="Repite la contraseña" required autocomplete="new-password">
                </div>

                <button type="submit" class="primary-button">Registrarse</button>
            </form>

            <div class="link-group">
                ¿Ya tienes cuenta? <a th:href="@{/login}">Iniciar sesión</a>
            </div>
        </section>
    </main>
</body>
</html>
