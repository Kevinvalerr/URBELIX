<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: page">
    <div th:fragment="content" th:with="titulo=${titulo}">
        <section class="page-top-section mb-4">
            <div>
                <h1>Registrar Residente</h1>
                <p class="text-muted">Completa los datos para crear el perfil del residente y asignarlo a su apartamento.</p>
            </div>
        </section>

        <div class="form-card">
            <form th:action="@{/residentes/guardar}" th:object="${residente}" method="post" class="form-grid">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" th:field="*{id}" />
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input id="nombre" type="text" th:field="*{nombre}" placeholder="Ingrese nombre completo" required />
                </div>
                <div class="form-group">
                    <label for="documento">Documento</label>
                    <input id="documento" type="text" th:field="*{documento}" placeholder="Número de documento" required />
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input id="telefono" type="text" th:field="*{telefono}" placeholder="Ej. 3101234567" required />
                </div>
                <div class="form-group">
                    <label for="apartamentoId">Apartamento</label>
                    <select id="apartamentoId" name="apartamentoId" required>
                        <option value="">Seleccione un apartamento</option>
                        <option th:each="ap : ${apartamentos}"
                                th:value="${ap.id}"
                                th:text="${ap.numero}"
                                th:selected="${residente.apartamento != null and residente.apartamento.id == ap.id}">
                        </option>
                    </select>
                </div>
                <div class="form-actions">
                    <a href="/residentes" class="btn btn-outline-primary">Volver a residentes</a>
                    <button type="submit" class="btn btn-primary btn-main-action">
                        <i class="bi bi-save me-2"></i>Guardar residente
                    </button>
                </div>
            </form>
        </div>
    </div>
</html>
