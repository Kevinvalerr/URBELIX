<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:replace="layout/base :: page">
    <div th:fragment="content" th:with="titulo='Residentes | Urbelix'">
        <!-- Page Header -->
        <div class="dashboard-welcome-header" style="margin-bottom: 2rem; padding: 2rem;">
            <div class="welcome-content" style="gap: 2rem;">
                <div class="welcome-avatar" style="background: linear-gradient(135deg, rgba(37, 99, 235, 0.2), rgba(168, 85, 247, 0.15));">
                    <i class="bi bi-people"></i>
                </div>
                <div class="welcome-text">
                    <h1 class="welcome-title">Gestión de Residentes</h1>
                    <p class="welcome-subtitle">Administra todos los residentes del condominio</p>
                </div>
            </div>
            <div class="welcome-stats">
                <div class="stat-item">
                    <div class="stat-number" th:text="${residentes.size()}">0</div>
                    <div class="stat-label">Total</div>
                </div>
            </div>
        </div>

        <!-- Create Resident Button -->
      
        <!-- Residents Table -->
        <div class="timeline-container" style="padding: 2rem;">
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; background: transparent;">
                    <thead>
                        <tr style="border-bottom: 2px solid rgba(37, 99, 235, 0.1);">
                            <th style="padding: 1rem; text-align: left; font-weight: 700; color: var(--text-primary); font-size: 0.95rem;">ID</th>
                            <th style="padding: 1rem; text-align: left; font-weight: 700; color: var(--text-primary); font-size: 0.95rem;">Nombre</th>
                            <th style="padding: 1rem; text-align: left; font-weight: 700; color: var(--text-primary); font-size: 0.95rem;">Documento</th>
                            <th style="padding: 1rem; text-align: left; font-weight: 700; color: var(--text-primary); font-size: 0.95rem;">Teléfono</th>
                            <th style="padding: 1rem; text-align: left; font-weight: 700; color: var(--text-primary); font-size: 0.95rem;">Apartamento</th>
                            <th style="padding: 1rem; text-align: center; font-weight: 700; color: var(--text-primary); font-size: 0.95rem;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="residente : ${residentes}" style="border-bottom: 1px solid rgba(37, 99, 235, 0.06); transition: background-color 0.3s ease;" onmouseover="this.style.backgroundColor='rgba(37, 99, 235, 0.02)'" onmouseout="this.style.backgroundColor='transparent'">
                            <td style="padding: 1rem; color: var(--text-primary); font-weight: 500;" th:text="${residente.id}"></td>
                            <td style="padding: 1rem; color: var(--text-primary); font-weight: 500;" th:text="${residente.nombre}"></td>
                            <td style="padding: 1rem; color: var(--text-primary); font-weight: 500;" th:text="${residente.documento}"></td>
                            <td style="padding: 1rem; color: var(--text-primary); font-weight: 500;" th:text="${residente.telefono}"></td>
                            <td style="padding: 1rem; color: var(--text-primary); font-weight: 500;" th:text="${residente.apartamento.numero}"></td>
                            <td style="padding: 1rem; text-align: center;">
                                <div style="display: flex; gap: 0.5rem; justify-content: center;">
                                    <a th:href="@{/residentes/editar/{id}(id=${residente.id})}" style="background: rgba(251, 191, 36, 0.1); color: #D97706; padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: all 0.3s ease;" onmouseover="this.style.background='rgba(251, 191, 36, 0.2)'" onmouseout="this.style.background='rgba(251, 191, 36, 0.1)'">
                                        <i class="bi bi-pencil"></i> Editar
                                    </a>
                                    <a th:href="@{/residentes/eliminar/{id}(id=${residente.id})}" style="background: rgba(239, 68, 68, 0.1); color: #DC2626; padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: all 0.3s ease;" onmouseover="this.style.background='rgba(239, 68, 68, 0.2)'" onmouseout="this.style.background='rgba(239, 68, 68, 0.1)'" onclick="return confirm('¿Estás seguro de que quieres eliminar este residente?')">
                                        <i class="bi bi-trash"></i> Eliminar
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(residentes)}" style="border-bottom: none;">
                            <td colspan="6" style="padding: 3rem; text-align: center; color: var(--text-muted); font-style: italic;">
                                <i class="bi bi-people" style="font-size: 3rem; color: var(--text-muted); margin-bottom: 1rem;"></i>
                                <br>
                                No hay residentes registrados
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</html>
